global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "java-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["java-service:8080"]
        labels:
          service: "ai-agent-java"

  - job_name: "python-ai-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["python-ai-service:8000"]
        labels:
          service: "ai-agent-python"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
