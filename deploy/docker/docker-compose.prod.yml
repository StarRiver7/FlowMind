version: "3.9"

services:
  java-service:
    image: ${DOCKER_REGISTRY:-registry.example.com}/ai-agent-java-service:${VERSION:-latest}
    container_name: ai-agent-java-service
    restart: always
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      AI_SERVICE_GRPC_HOST: ${AI_SERVICE_GRPC_HOST}
      AI_SERVICE_GRPC_PORT: ${AI_SERVICE_GRPC_PORT:-50051}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - ai-agent-net

  python-ai-service:
    image: ${DOCKER_REGISTRY:-registry.example.com}/ai-agent-python-service:${VERSION:-latest}
    container_name: ai-agent-python-service
    restart: always
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      ENV: prod
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JAVA_SERVICE_URL: ${JAVA_SERVICE_URL}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - ai-agent-net

networks:
  ai-agent-net:
    driver: bridge
