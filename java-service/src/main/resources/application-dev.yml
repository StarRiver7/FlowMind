# ============================================================
# 开发环境配置 — 所有值均为本地开发默认值，可直接启动
# ============================================================
spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/enterprise_ai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true"
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ai-agent-java-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.company.aiplatform: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

# === JWT ===
jwt:
  secret: dev-secret-key-not-for-production-use
  issuer: enterprise-ai-agent-platform
  expiration: 900000
  refresh-expiration: 604800000

# === App Config ===
app:
  ai-service:
    base-url: http://localhost:8000
    grpc-host: localhost
    grpc-port: 50051
    timeout: 60s
